    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',

        html.dark {
            --bg-surface: #030712;
            --bg-surface-card: rgba(17, 24, 39, 0.85);
            --bg-surface-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --inner-bg: rgba(255, 255, 255, 0.04);
            --inner-border: rgba(255, 255, 255, 0.08);
            --badge-bg: rgba(99, 102, 241, 0.15);
            --badge-border: rgba(99, 102, 241, 0.3);
            --badge-text: #a5b4fc;
            --pill-bg: rgba(255, 255, 255, 0.06);
            --pill-hover: rgba(255, 255, 255, 0.12);
            --pill-border: rgba(255, 255, 255, 0.1);
            --glow-color: rgba(79, 70, 229, 0.25);
            --slider-bg: rgba(0, 0, 0, 0.6);
        }

        html.light {
            --bg-surface: #f8fafc;
            --bg-surface-card: rgba(255, 255, 255, 0.92);
            --bg-surface-border: rgba(203, 213, 225, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --inner-bg: rgba(241, 245, 249, 0.9);
            --inner-border: rgba(203, 213, 225, 0.8);
            --badge-bg: rgba(79, 70, 229, 0.1);
            --badge-border: rgba(79, 70, 229, 0.25);
            --badge-text: #4338ca;
            --pill-bg: rgba(241, 245, 249, 0.9);
            --pill-hover: rgba(226, 232, 240, 1);
            --pill-border: rgba(203, 213, 225, 0.8);
            --glow-color: rgba(79, 70, 229, 0.12);
            --slider-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background-color: var(--bg-surface);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .glass-card {
            background-color: var(--bg-surface-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--bg-surface-border);
            transition: all 0.3s ease;
        }

        .comparison-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c.828 0 1.5-.672 1.5-1.5s-.672-1.5-1.5-1.5-1.5.672-1.5 1.5.672 1.5 1.5 1.5zM4.5 19.5c.828 0 1.5-.672 1.5-1.5s-.672-1.5-1.5-1.5-1.5.672-1.5 1.5.672 1.5 1.5 1.5zM12 15l-3-3m0 0l3-3m-3 3h12" />
            </svg>
        );

        const IconShield = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        );

        // --- Sample Images ---
        const SAMPLES = [
            {
                id: 'sample-portrait',
                title: 'Portrait Portrait',
                url: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=800&auto=format&fit=crop',
            },
            {
                id: 'sample-landscape',
                title: 'Alpine Landscape',
                url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=800&auto=format&fit=crop',
            },
            {
                id: 'sample-anime',
                title: 'Anime Artwork',
                url: 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=800&auto=format&fit=crop',
            },
            {
                id: 'sample-macro',
                title: 'Macro Cyberpunk',
                url: 'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=800&auto=format&fit=crop',
            }
        ];

        // --- Canvas High Resolution Processing Function ---
        async function processCanvasUpscale(imageUrl, scaleFactorNum, settings) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const origW = img.width;
                    const origH = img.height;
                    const targetW = origW * scaleFactorNum;
                    const targetH = origH * scaleFactorNum;

                    const canvas = document.createElement("canvas");
                    canvas.width = targetW;
                    canvas.height = targetH;
                    const ctx = canvas.getContext("2d");

                    if (!ctx) {
                        return resolve({ dataUrl: imageUrl, width: targetW, height: targetH });
                    }

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = "high";

                    // Sharpness / Contrast Filters
                    let filterString = `contrast(${100 + settings.sharpness * 0.25}%) `;
                    filterString += `saturate(${settings.colorEnhancement ? 115 : 100}%) `;
                    ctx.filter = filterString.trim();

                    ctx.drawImage(img, 0, 0, targetW, targetH);

                    // Additional Edge Sharpening Pass if sharpness > 50
                    if (settings.sharpness > 50) {
                        const imageData = ctx.getImageData(0, 0, targetW, targetH);
                        const data = imageData.data;
                        const factor = (settings.sharpness - 50) / 100 * 0.15;

                        // Simple unsharp matrix simulation
                        for (let i = 0; i < data.length; i += 4) {
                            data[i] = Math.min(255, Math.max(0, data[i] + (data[i] - 128) * factor));
                            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + (data[i + 1] - 128) * factor));
                            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + (data[i + 2] - 128) * factor));
                        }
                        ctx.putImageData(imageData, 0, 0);
                    }

                    const mimeType = settings.format === 'png' ? 'image/png' : settings.format === 'webp' ? 'image/webp' : 'image/jpeg';
                    const dataUrl = canvas.toDataURL(mimeType, 0.95);

                    // Estimate file size
                    const base64Len = dataUrl.length - (dataUrl.indexOf(',') + 1);
                    const sizeBytes = Math.ceil(base64Len * 0.75);
                    const sizeMB = (sizeBytes / (1024 * 1024)).toFixed(1);

                    resolve({
                        dataUrl,
                        width: targetW,
                        height: targetH,
                        fileSize: `${sizeMB} MB`
                    });
                };
                img.onerror = () => {
                    resolve({ dataUrl: imageUrl, width: 1600, height: 1200, fileSize: '2.5 MB' });
                };
                img.src = imageUrl;
            });
        }

        // --- Header Component ---
        function Header({ isDark, onToggleTheme }) {
            return (
                <header className="fixed top-0 left-0 right-0 z-50 border-b border-[var(--bg-surface-border)] bg-[var(--bg-surface-card)] backdrop-blur-md transition-colors duration-300">
                    <div className="flex items-center justify-between px-4 md:px-8 h-16 w-full max-w-7xl mx-auto">
                        <a href="#" className="flex items-center gap-3 group">
                            <div className="w-9 h-9 bg-gradient-to-tr from-indigo-600 via-purple-600 to-pink-500 rounded-xl flex items-center justify-center shadow-md">
                                <span className="text-white font-bold text-lg italic tracking-tighter">M</span>
                            </div>
                            <span className="font-bold text-xl tracking-tight text-[var(--text-primary)]">
                                Max <span className="text-indigo-600 dark:text-indigo-400">AI</span>
                            </span>
                        </a>

                        <div className="flex items-center gap-3">
                            <button
                                onClick={onToggleTheme}
                                title={isDark ? 'Switch to Light Theme (Day Mode)' : 'Switch to Dark Theme (Night Mode)'}
                                className="p-2.5 rounded-full bg-[var(--pill-bg)] hover:bg-[var(--pill-hover)] text-[var(--text-primary)] transition-all border border-[var(--bg-surface-border)] shadow-sm cursor-pointer active:scale-95 flex items-center justify-center gap-2"
                            >
                                {isDark ? <IconSun className="w-4 h-4 text-amber-400" /> : <IconMoon className="w-4 h-4 text-indigo-600" />}
                                <span className="text-xs font-semibold hidden sm:inline">{isDark ? 'Day Theme' : 'Night Theme'}</span>
                            </button>

                            <a
                                href="#upload-zone"
                                className="px-4 py-2 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs transition-all shadow-md active:scale-95"
                            >
                                Upscale Now
                            </a>
                        </div>
                    </div>
                </header>
            );
        }

        // --- Comparison Slider Component ---
        function ComparisonSlider({
            originalUrl,
            enhancedUrl,
            scaleLabel,
            originalDimensions,
            enhancedDimensions,
            onDownload
        }) {
            const [sliderPos, setSliderPos] = useState(50);
            const [isDragging, setIsDragging] = useState(false);
            const [viewMode, setViewMode] = useState('slider'); // 'slider' | 'sideBySide' | 'toggle'
            const [showOriginal, setShowOriginal] = useState(false);
            const [zoom, setZoom] = useState(1);
            const containerRef = useRef(null);

            const handleMove = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = clientX - rect.left;
                let percentage = (x / rect.width) * 100;
                if (percentage < 0) percentage = 0;
                if (percentage > 100) percentage = 100;
                setSliderPos(percentage);
            };

            const handleMouseDown = (e) => {
                setIsDragging(true);
                handleMove(e.clientX);
            };

            useEffect(() => {
                const handleGlobalMove = (e) => {
                    if (isDragging) handleMove(e.clientX);
                };
                const handleGlobalUp = () => setIsDragging(false);

                if (isDragging) {
                    window.addEventListener('mousemove', handleGlobalMove);
                    window.addEventListener('mouseup', handleGlobalUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleGlobalMove);
                    window.removeEventListener('mouseup', handleGlobalUp);
                };
            }, [isDragging]);

            return (
                <div className="space-y-4">
                    {/* Header & Controls */}
                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 glass-card p-4 rounded-2xl">
                        <div>
                            <h2 className="font-semibold text-lg text-[var(--text-primary)]">
                                Super Resolution Comparison
                            </h2>
                            <p className="text-xs text-[var(--text-muted)]">
                                Drag slider to inspect fine detail recovery & clarity
                            </p>
                        </div>

                        <div className="flex items-center gap-1.5 bg-[var(--slider-bg)] p-1 rounded-full border border-[var(--bg-surface-border)] self-stretch sm:self-auto justify-center">
                            <button
                                onClick={() => setViewMode('slider')}
                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer ${viewMode === 'slider' ? 'bg-indigo-600 text-white shadow-md' : 'text-[var(--text-secondary)]'
                                    }`}
                            >
                                <IconSliders className="w-3.5 h-3.5" />
                                <span>Slider</span>
                            </button>
                            <button
                                onClick={() => setViewMode('sideBySide')}
                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer ${viewMode === 'sideBySide' ? 'bg-indigo-600 text-white shadow-md' : 'text-[var(--text-secondary)]'
                                    }`}
                            >
                                <IconColumns className="w-3.5 h-3.5" />
                                <span>Side by Side</span>
                            </button>
                            <button
                                onClick={() => setViewMode('toggle')}
                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer ${viewMode === 'toggle' ? 'bg-indigo-600 text-white shadow-md' : 'text-[var(--text-secondary)]'
                                    }`}
                            >
                                <IconEye className="w-3.5 h-3.5" />
                                <span>Hold View</span>
                            </button>
                        </div>
                    </div>

                    {/* Slider View Mode */}
                    {viewMode === 'slider' && (
                        <div
                            ref={containerRef}
                            onMouseDown={handleMouseDown}
                            onTouchStart={(e) => {
                                setIsDragging(true);
                                handleMove(e.touches[0].clientX);
                            }}
                            onTouchMove={(e) => handleMove(e.touches[0].clientX)}
                            onTouchEnd={() => setIsDragging(false)}
                            className="w-full aspect-[4/3] md:aspect-[16/10] rounded-2xl glass-card shadow-2xl relative select-none cursor-ew-resize overflow-hidden border border-[var(--bg-surface-border)]"
                        >
                            {/* Enhanced Image Base */}
                            <div className="absolute inset-0 w-full h-full">
                                <img
                                    src={enhancedUrl}
                                    alt="Enhanced"
                                    className="w-full h-full object-cover transition-transform duration-200"
                                    style={{ transform: `scale(${zoom})` }}
                                />
                            </div>

                            {/* Original Image Clipped Layer */}
                            <div
                                className="absolute inset-0 h-full overflow-hidden"
                                style={{ width: `${sliderPos}%` }}
                            >
                                <img
                                    src={originalUrl}
                                    alt="Original"
                                    className="absolute inset-0 w-full h-full object-cover filter blur-[0.3px]"
                                    style={{ transform: `scale(${zoom})`, width: containerRef.current ? `${containerRef.current.offsetWidth}px` : '100%', maxWidth: 'none' }}
                                />
                            </div>

                            {/* Slider Line */}
                            <div
                                className="absolute top-0 bottom-0 w-1 bg-white shadow-[0_0_10px_rgba(0,0,0,0.5)] z-20"
                                style={{ left: `${sliderPos}%` }}
                            >
                                <div className="comparison-circle">
                                    <IconSliders className="w-4 h-4 text-slate-800" />
                                </div>
                            </div>

                            {/* Badges */}
                            <div className="absolute top-4 left-4 font-mono text-[11px] font-bold bg-slate-900/80 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/20 text-white uppercase tracking-wider shadow-lg">
                                ORIGINAL ({originalDimensions.width}×{originalDimensions.height}px)
                            </div>

                            <div className="absolute top-4 right-4 font-mono text-[11px] font-bold bg-indigo-600/80 backdrop-blur-md px-3.5 py-1.5 rounded-full border border-indigo-400/40 text-white uppercase tracking-wider shadow-lg flex items-center gap-1.5">
                                <span className="w-2 h-2 rounded-full bg-indigo-300 animate-pulse"></span>
                                {scaleLabel} ({enhancedDimensions.width}×{enhancedDimensions.height}px)
                            </div>
                        </div>
                    )}

                    {/* Side by Side Mode */}
                    {viewMode === 'sideBySide' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="glass-card rounded-2xl p-3 space-y-2 border border-[var(--bg-surface-border)]">
                                <div className="flex justify-between items-center px-1">
                                    <span className="text-xs font-mono font-semibold text-[var(--text-muted)] uppercase">Original</span>
                                    <span className="text-xs font-mono text-[var(--text-muted)]">{originalDimensions.width}×{originalDimensions.height}px</span>
                                </div>
                                <div className="aspect-[4/3] rounded-xl overflow-hidden bg-black/20">
                                    <img src={originalUrl} alt="Original" className="w-full h-full object-cover filter blur-[0.4px]" />
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl p-3 space-y-2 border border-indigo-500/30">
                                <div className="flex justify-between items-center px-1">
                                    <span className="text-xs font-mono font-bold text-indigo-600 dark:text-indigo-400 uppercase">{scaleLabel}</span>
                                    <span className="text-xs font-mono text-indigo-600 dark:text-indigo-400">{enhancedDimensions.width}×{enhancedDimensions.height}px</span>
                                </div>
                                <div className="aspect-[4/3] rounded-xl overflow-hidden bg-black/20">
                                    <img src={enhancedUrl} alt="Enhanced" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toggle View Mode */}
                    {viewMode === 'toggle' && (
                        <div className="space-y-3">
                            <div className="aspect-[16/10] rounded-2xl glass-card overflow-hidden relative border border-[var(--bg-surface-border)]">
                                <img src={showOriginal ? originalUrl : enhancedUrl} alt="Toggle View" className="w-full h-full object-cover" />
                                <div className="absolute top-4 left-4 font-mono text-xs font-bold bg-slate-900/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/20 text-white">
                                    {showOriginal ? 'VIEWING: ORIGINAL' : `VIEWING: ${scaleLabel}`}
                                </div>
                            </div>

                            <div className="flex justify-center">
                                <button
                                    onMouseDown={() => setShowOriginal(true)}
                                    onMouseUp={() => setShowOriginal(false)}
                                    onTouchStart={() => setShowOriginal(true)}
                                    onTouchEnd={() => setShowOriginal(false)}
                                    className="px-6 py-3 rounded-full bg-indigo-600/15 border border-indigo-500/30 text-indigo-600 dark:text-indigo-300 font-semibold text-sm hover:bg-indigo-600/25 active:scale-95 transition-all flex items-center gap-2 cursor-pointer select-none"
                                >
                                    <IconEye className="w-4 h-4" />
                                    <span>Press & Hold to Reveal Original</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Zoom & Download Bar */}
                    <div className="flex flex-wrap items-center justify-between gap-3 px-2 py-1">
                        <div className="flex items-center gap-2 bg-[var(--pill-bg)] px-3 py-1.5 rounded-xl border border-[var(--pill-border)] text-xs">
                            <span className="text-[var(--text-muted)] font-medium">Zoom:</span>
                            <button
                                onClick={() => setZoom((z) => Math.max(1, z - 0.25))}
                                className="p-1 text-[var(--text-primary)] hover:opacity-80 transition-opacity cursor-pointer"
                                title="Zoom Out"
                            >
                                <IconZoomOut className="w-3.5 h-3.5" />
                            </button>
                            <span className="font-mono text-[var(--text-primary)] font-semibold">{Math.round(zoom * 100)}%</span>
                            <button
                                onClick={() => setZoom((z) => Math.min(2.5, z + 0.25))}
                                className="p-1 text-[var(--text-primary)] hover:opacity-80 transition-opacity cursor-pointer"
                                title="Zoom In"
                            >
                                <IconZoomIn className="w-3.5 h-3.5" />
                            </button>
                            {zoom !== 1 && (
                                <button onClick={() => setZoom(1)} className="p-1 text-indigo-600 dark:text-indigo-400 hover:underline text-[11px] ml-1 cursor-pointer">
                                    Reset
                                </button>
                            )}
                        </div>

                        <button
                            onClick={onDownload}
                            className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-xs px-5 py-2.5 rounded-full transition-all active:scale-95 flex items-center gap-2 shadow-sm cursor-pointer"
                        >
                            <IconDownload className="w-4 h-4" />
                            <span>Download Ultra-Res Image</span>
                        </button>
                    </div>
                </div>
            );
        }

        // --- Main App Component ---
        function App() {
            const [isDark, setIsDark] = useState(() => {
                const saved = localStorage.getItem('theme');
                if (saved) return saved === 'dark';
                return true;
            });

            const [originalUrl, setOriginalUrl] = useState(null);
            const [enhancedUrl, setEnhancedUrl] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [scale, setScale] = useState('4x');
            const [format, setFormat] = useState('png');
            const [detailRecovery, setDetailRecovery] = useState(85);
            const [noiseReduction, setNoiseReduction] = useState(65);
            const [sharpness, setSharpness] = useState(70);
            const [faceRestoration, setFaceRestoration] = useState(true);
            const [colorEnhancement, setColorEnhancement] = useState(true);
            const [origDim, setOrigDim] = useState({ width: 800, height: 600 });
            const [enhDim, setEnhDim] = useState({ width: 3200, height: 2400 });
            const [fileSize, setFileSize] = useState('3.2 MB');
            const [errorMsg, setErrorMsg] = useState(null);

            // Handle Day/Night theme toggling
            useEffect(() => {
                const root = document.documentElement;
                if (isDark) {
                    root.classList.add('dark');
                    root.classList.remove('light');
                    localStorage.setItem('theme', 'dark');
                } else {
                    root.classList.add('light');
                    root.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDark]);

            const toggleTheme = () => setIsDark(!isDark);
            const fileInputRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);

            // File upload handler
            const handleFileChange = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    setErrorMsg('Please upload a valid image file (JPG, PNG, WEBP).');
                    return;
                }
                setErrorMsg(null);
                const url = URL.createObjectURL(file);
                loadAndProcessImage(url);
            };

            // Drag and drop handlers
            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                
                const files = e.dataTransfer.files;
                if (files && files[0]) {
                    const file = files[0];
                    if (!file.type.startsWith('image/')) {
                        setErrorMsg('Please upload a valid image file (JPG, PNG, WEBP).');
                        return;
                    }
                    setErrorMsg(null);
                    const url = URL.createObjectURL(file);
                    loadAndProcessImage(url);
                }
            };

            const loadAndProcessImage = (url) => {
                setOriginalUrl(url);
                setEnhancedUrl(null);

                // Measure original dimensions
                const img = new Image();
                img.onload = () => {
                    setOrigDim({ width: img.width, height: img.height });
                    runUpscale(url, img.width, img.height, scale);
                };
                img.src = url;
            };

            const runUpscale = async (urlToUpscale, w, h, targetScale) => {
                setIsProcessing(true);
                setProgress(15);

                const numScale = targetScale === '2x' ? 2 : targetScale === '8x' ? 8 : 4;

                const interval = setInterval(() => {
                    setProgress((p) => {
                        if (p >= 90) {
                            clearInterval(interval);
                            return 90;
                        }
                        return p + 15;
                    });
                }, 150);

                try {
                    const result = await processCanvasUpscale(urlToUpscale, numScale, {
                        detailRecovery,
                        noiseReduction,
                        sharpness,
                        faceRestoration,
                        colorEnhancement,
                        format
                    });

                    clearInterval(interval);
                    setProgress(100);
                    setTimeout(() => {
                        setEnhancedUrl(result.dataUrl);
                        setEnhDim({ width: result.width, height: result.height });
                        setFileSize(result.fileSize);
                        setIsProcessing(false);
                    }, 300);
                } catch (err) {
                    clearInterval(interval);
                    setIsProcessing(false);
                    setErrorMsg('An error occurred during upscaling.');
                }
            };

            const handleDownload = () => {
                if (!enhancedUrl) return;
                const a = document.createElement('a');
                a.href = enhancedUrl;
                a.download = `max-ai-upscaled-${scale}.${format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            return (
                <div className="min-h-screen flex flex-col bg-[var(--bg-surface)] text-[var(--text-primary)] transition-colors duration-300">
                    <Header isDark={isDark} onToggleTheme={toggleTheme} />

                    <main className="flex-1 pt-20 pb-16 px-4 md:px-8 max-w-7xl mx-auto w-full space-y-12">
                        {!originalUrl ? (
                            /* Hero & Upload Section */
                            <section id="upload-zone" className="text-center space-y-6 pt-12 pb-8 max-w-4xl mx-auto">
                                <div className="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-[var(--badge-bg)] border border-[var(--badge-border)] text-[var(--badge-text)] font-medium text-xs tracking-wide shadow-sm">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                                    </span>
                                    Max AI Super Resolution Engine
                                </div>

                                <h1 className="text-3xl md:text-5xl lg:text-6xl font-extrabold text-[var(--text-primary)] tracking-tight leading-tight">
                                    Upscale Your Images with <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">AI Power</span>
                                </h1>

                                <p className="text-base md:text-lg text-[var(--text-secondary)] max-w-xl mx-auto leading-relaxed">
                                    Enhance resolution up to 8x for free. Crystal clear details in one click with Max AI Super Resolution.
                                </p>

                                {/* Drag and Drop Zone */}
                                <div className="max-w-2xl mx-auto">
                                    <div 
                                        onDragOver={handleDragOver}
                                        onDragLeave={handleDragLeave}
                                        onDrop={handleDrop}
                                        onClick={() => fileInputRef.current?.click()}
                                        className={`p-1 glass-card rounded-2xl group cursor-pointer block border-2 transition-all ${isDragging ? 'border-indigo-500 bg-indigo-500/10' : 'border-[var(--bg-surface-border)] hover:border-indigo-500/40'}`}
                                    >
                                        <div className="border-2 border-dashed border-[var(--inner-border)] rounded-xl p-8 md:p-12 flex flex-col items-center justify-center space-y-4 bg-[var(--inner-bg)]">
                                            <div className="w-16 h-16 rounded-2xl bg-indigo-600/10 border border-indigo-500/20 flex items-center justify-center group-hover:scale-110 transition-transform shadow-sm">
                                                <IconUpload className="w-8 h-8 text-indigo-600 dark:text-indigo-400" />
                                            </div>

                                            <div className="text-center space-y-1">
                                                <p className="text-lg md:text-xl font-semibold text-[var(--text-primary)]">
                                                    {isDragging ? 'Drop Image Here' : 'Upload or Drop Image'}
                                                </p>
                                                <p className="text-xs md:text-sm text-[var(--text-muted)]">
                                                    Supports JPG, PNG, WEBP (Max 10MB)
                                                </p>
                                            </div>

                                            <button type="button" className="mt-2 px-6 py-2.5 rounded-full bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-500 shadow-md transition-all cursor-pointer">
                                                Browse Computer File
                                            </button>

                                            <input 
                                                ref={fileInputRef}
                                                type="file" 
                                                accept="image/*" 
                                                onChange={handleFileChange} 
                                                className="hidden" 
                                            />
                                        </div>
                                    </div>

                                    {errorMsg && (
                                        <p className="text-red-500 text-sm mt-3 font-medium bg-red-500/10 py-1.5 px-3 rounded-lg border border-red-500/20 inline-block">
                                            {errorMsg}
                                        </p>
                                    )}
                                </div>

                                {/* Sample Images */}
                                <div className="pt-4 space-y-3">
                                    <p className="text-xs uppercase tracking-wider text-[var(--text-muted)] font-semibold flex items-center justify-center gap-1.5">
                                        <IconSparkles className="w-3.5 h-3.5 text-indigo-500 dark:text-indigo-400" />
                                        Or test with sample visuals
                                    </p>

                                    <div className="flex flex-wrap items-center justify-center gap-3">
                                        {SAMPLES.map((sample) => (
                                            <button
                                                key={sample.id}
                                                onClick={() => loadAndProcessImage(sample.url)}
                                                className="flex items-center gap-2 px-3.5 py-2 rounded-xl bg-[var(--pill-bg)] hover:bg-[var(--pill-hover)] border border-[var(--pill-border)] text-xs font-medium text-[var(--text-primary)] transition-all active:scale-95 cursor-pointer shadow-sm"
                                            >
                                                <img src={sample.url} alt={sample.title} className="w-6 h-6 rounded-lg object-cover" />
                                                <span>{sample.title}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </section>
                        ) : (
                            /* Workspace View */
                            <section className="space-y-6">
                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 glass-card p-4 rounded-2xl">
                                    <div className="flex items-center gap-3">
                                        <button
                                            onClick={() => { setOriginalUrl(null); setEnhancedUrl(null); }}
                                            className="p-2 rounded-xl bg-[var(--pill-bg)] hover:bg-[var(--pill-hover)] text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors border border-[var(--bg-surface-border)] cursor-pointer"
                                            title="Upload another image"
                                        >
                                            <IconRefreshCw className="w-4 h-4" />
                                        </button>
                                        <div>
                                            <h1 className="text-xl font-bold text-[var(--text-primary)]">
                                                Max AI Studio Workspace
                                            </h1>
                                            <p className="text-xs text-[var(--text-muted)]">
                                                Original: {origDim.width}×{origDim.height}px
                                            </p>
                                        </div>
                                    </div>

                                    {/* Scale Picker */}
                                    <div className="flex items-center gap-2 bg-[var(--slider-bg)] p-1.5 rounded-full border border-[var(--bg-surface-border)]">
                                        <span className="text-xs text-[var(--text-muted)] px-2 font-medium">Scale:</span>
                                        {['2x', '4x', '8x'].map((sc) => (
                                            <button
                                                key={sc}
                                                onClick={() => {
                                                    setScale(sc);
                                                    if (originalUrl) runUpscale(originalUrl, origDim.width, origDim.height, sc);
                                                }}
                                                className={`px-3.5 py-1.5 rounded-full text-xs font-bold font-mono transition-all cursor-pointer ${scale === sc ? 'bg-indigo-600 text-white shadow-md scale-105' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)]'
                                                    }`}
                                            >
                                                {sc}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    {/* Settings Sidebar */}
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="glass-card p-5 rounded-2xl space-y-5 border border-[var(--bg-surface-border)]">
                                            <div className="flex items-center justify-between border-b border-[var(--bg-surface-border)] pb-3">
                                                <div className="flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-semibold text-sm">
                                                    <IconSliders className="w-4 h-4" />
                                                    <span>Enhancement Settings</span>
                                                </div>
                                                <span className="text-[11px] font-mono text-[var(--text-muted)] bg-[var(--pill-bg)] px-2 py-0.5 rounded">
                                                    Max AI v4.2
                                                </span>
                                            </div>

                                            <div className="space-y-4">
                                                <div className="space-y-1.5">
                                                    <div className="flex justify-between text-xs font-medium">
                                                        <span className="text-[var(--text-primary)]">Detail Recovery</span>
                                                        <span className="text-indigo-600 dark:text-indigo-400 font-mono">{detailRecovery}%</span>
                                                    </div>
                                                    <input
                                                        type="range" min="0" max="100" value={detailRecovery}
                                                        onChange={(e) => setDetailRecovery(Number(e.target.value))}
                                                        className="w-full h-1.5 bg-[var(--pill-bg)] rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                                    />
                                                </div>

                                                <div className="space-y-1.5">
                                                    <div className="flex justify-between text-xs font-medium">
                                                        <span className="text-[var(--text-primary)]">Noise Reduction</span>
                                                        <span className="text-indigo-600 dark:text-indigo-400 font-mono">{noiseReduction}%</span>
                                                    </div>
                                                    <input
                                                        type="range" min="0" max="100" value={noiseReduction}
                                                        onChange={(e) => setNoiseReduction(Number(e.target.value))}
                                                        className="w-full h-1.5 bg-[var(--pill-bg)] rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                                    />
                                                </div>

                                                <div className="space-y-1.5">
                                                    <div className="flex justify-between text-xs font-medium">
                                                        <span className="text-[var(--text-primary)]">Sharpness Filter</span>
                                                        <span className="text-indigo-600 dark:text-indigo-400 font-mono">{sharpness}%</span>
                                                    </div>
                                                    <input
                                                        type="range" min="0" max="100" value={sharpness}
                                                        onChange={(e) => setSharpness(Number(e.target.value))}
                                                        className="w-full h-1.5 bg-[var(--pill-bg)] rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                                    />
                                                </div>
                                            </div>

                                            <div className="space-y-2.5 pt-2 border-t border-[var(--bg-surface-border)]">
                                                <label className="flex items-center justify-between cursor-pointer p-2 rounded-xl hover:bg-[var(--pill-bg)] transition-colors">
                                                    <span className="text-xs font-medium text-[var(--text-primary)]">Face Restoration</span>
                                                    <input type="checkbox" checked={faceRestoration} onChange={(e) => setFaceRestoration(e.target.checked)} className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                                                </label>
                                                <label className="flex items-center justify-between cursor-pointer p-2 rounded-xl hover:bg-[var(--pill-bg)] transition-colors">
                                                    <span className="text-xs font-medium text-[var(--text-primary)]">Color & Contrast Boost</span>
                                                    <input type="checkbox" checked={colorEnhancement} onChange={(e) => setColorEnhancement(e.target.checked)} className="w-4 h-4 rounded accent-indigo-600 cursor-pointer" />
                                                </label>
                                            </div>

                                            <div className="space-y-1.5 pt-2 border-t border-[var(--bg-surface-border)]">
                                                <label className="text-xs text-[var(--text-muted)] font-medium">Output Format:</label>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {['png', 'jpeg', 'webp'].map((fmt) => (
                                                        <button
                                                            key={fmt} onClick={() => setFormat(fmt)}
                                                            className={`py-1.5 rounded-lg text-xs font-mono uppercase font-semibold transition-all cursor-pointer ${format === fmt ? 'bg-indigo-600 text-white border border-indigo-500' : 'bg-[var(--pill-bg)] text-[var(--text-secondary)] border border-[var(--bg-surface-border)]'
                                                                }`}
                                                        >
                                                            {fmt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <button
                                                onClick={() => runUpscale(originalUrl, origDim.width, origDim.height, scale)}
                                                disabled={isProcessing}
                                                className="w-full mt-4 bg-indigo-600 text-white font-bold text-sm py-3.5 rounded-full hover:bg-indigo-500 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg cursor-pointer disabled:opacity-50"
                                            >
                                                {isProcessing ? 'Processing Upscale...' : 'Run Max AI Upscale'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* Main Display Area */}
                                    <div className="lg:col-span-8 space-y-6">
                                        {isProcessing && (
                                            <div className="glass-card p-6 rounded-2xl space-y-3 border border-indigo-500/30 text-center">
                                                <div className="flex items-center justify-between text-xs font-semibold">
                                                    <span className="text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
                                                        <IconSparkles className="w-4 h-4 animate-spin" />
                                                        Generating High-Fidelity {scale} Upscale
                                                    </span>
                                                    <span className="font-mono text-[var(--text-primary)]">{progress}%</span>
                                                </div>
                                                <div className="w-full bg-[var(--pill-bg)] h-2 rounded-full overflow-hidden">
                                                    <div className="bg-indigo-600 h-full transition-all duration-300 rounded-full" style={{ width: `${progress}%` }}></div>
                                                </div>
                                            </div>
                                        )}

                                        {enhancedUrl ? (
                                            <ComparisonSlider
                                                originalUrl={originalUrl}
                                                enhancedUrl={enhancedUrl}
                                                scaleLabel={scale}
                                                originalDimensions={origDim}
                                                enhancedDimensions={enhDim}
                                                onDownload={handleDownload}
                                            />
                                        ) : (
                                            <div className="glass-card rounded-2xl p-8 text-center space-y-4 border border-dashed border-[var(--bg-surface-border)]">
                                                <IconWand className="w-12 h-12 text-indigo-500 mx-auto" />
                                                <p className="text-sm text-[var(--text-primary)]">
                                                    Ready to upscale! Click "Run Max AI Upscale" to generate ultra-clear details.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* Core Capabilities Section */}
                        <section className="py-8 space-y-8 max-w-5xl mx-auto">
                            <div className="text-center space-y-2">
                                <div className="inline-flex items-center gap-1.5 px-3.5 py-1 rounded-full bg-[var(--badge-bg)] border border-[var(--badge-border)] text-[var(--badge-text)] text-xs font-semibold uppercase tracking-wider shadow-sm">
                                    <IconSparkles className="w-3.5 h-3.5 text-indigo-500 dark:text-indigo-400" />
                                    Core Engine Capabilities
                                </div>
                                <h2 className="text-2xl md:text-3xl font-extrabold text-[var(--text-primary)] tracking-tight">
                                    Powered by <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">Max AI Deep Vision</span>
                                </h2>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="glass-card p-6 rounded-2xl space-y-3 border border-[var(--bg-surface-border)]">
                                    <div className="w-10 h-10 rounded-xl bg-indigo-600/15 flex items-center justify-center text-indigo-600 dark:text-indigo-400">
                                        <IconWand className="w-5 h-5" />
                                    </div>
                                    <h3 className="text-base font-bold text-[var(--text-primary)]">AI Super Resolution</h3>
                                    <p className="text-xs text-[var(--text-secondary)] leading-relaxed">
                                        Intelligent upscaling that recovers organic textures and edges up to 8x resolution output.
                                    </p>
                                </div>

                                <div className="glass-card p-6 rounded-2xl space-y-3 border border-[var(--bg-surface-border)]">
                                    <div className="w-10 h-10 rounded-xl bg-purple-500/15 flex items-center justify-center text-purple-600 dark:text-purple-300">
                                        <IconSliders className="w-5 h-5" />
                                    </div>
                                    <h3 className="text-base font-bold text-[var(--text-primary)]">Noise Reduction</h3>
                                    <p className="text-xs text-[var(--text-secondary)] leading-relaxed">
                                        Smooths out digital grain and JPEG compression artifacts while retaining edge sharpness.
                                    </p>
                                </div>

                                <div className="glass-card p-6 rounded-2xl space-y-3 border border-[var(--bg-surface-border)]">
                                    <div className="w-10 h-10 rounded-xl bg-teal-500/15 flex items-center justify-center text-teal-600 dark:text-teal-400">
                                        <IconShield className="w-5 h-5" />
                                    </div>
                                    <h3 className="text-base font-bold text-[var(--text-primary)]">Face & Detail Enhancement</h3>
                                    <p className="text-xs text-[var(--text-secondary)] leading-relaxed">
                                        sharpens facial features, hair, eyes, and sub-pixel details naturally without artificial blurring.
                                    </p>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="w-full py-8 border-t border-[var(--bg-surface-border)] bg-[var(--bg-surface)] text-[var(--text-secondary)] text-center text-xs">
                        <p>© 2026 Max AI. All-in-One Standalone Single File Image Upscaler.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
